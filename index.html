<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Koré · Panel interno</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --green-900:#143324;
    --green-700:#1c5238;
    --green-600:#256a48;
    --green-500:#2f8559;
    --green-300:#7bc49b;
    --green-100:#e2f0e8;
    --ink:#192019;
    --muted:#646e66;
    --faint:#8b938c;
    --line:#e4e8e3;
    --line-strong:#d2d8d1;
    --surface:#ffffff;
    --bg:#f5f7f4;
    --sand:#f4ede2;
    --sand-line:#e7dcc8;
    --amber-700:#8a5a16;
    --amber-100:#f6e9d2;
    --red-700:#94342c;
    --red-100:#f6e0dd;
    --radius:14px;
    --radius-sm:9px;
    --shadow:0 1px 2px rgba(20,51,36,.05),0 8px 24px -18px rgba(20,51,36,.35);
    --display:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--body);
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  button{font-family:inherit}
  ::selection{background:var(--green-100)}

  /* ---------- Shell ---------- */
  .app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}

  .side{
    background:var(--green-900);
    color:#e9f1ec;
    display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh;
    padding:22px 16px;
  }
  .brand{display:flex;align-items:center;gap:11px;padding:4px 8px 22px}
  .brand .mark{
    width:34px;height:34px;border-radius:9px;flex:none;
    background:linear-gradient(150deg,var(--green-500),var(--green-300));
    display:grid;place-items:center;
    font-family:var(--display);font-weight:700;color:var(--green-900);font-size:19px;
  }
  .brand b{font-family:var(--display);font-weight:600;font-size:17px;letter-spacing:.3px;display:block;line-height:1}
  .brand small{color:var(--green-300);font-size:11px;letter-spacing:.14em;text-transform:uppercase}

  .nav{display:flex;flex-direction:column;gap:2px;margin-top:6px}
  .nav button{
    display:flex;align-items:center;gap:11px;width:100%;
    background:transparent;border:0;cursor:pointer;
    color:#c4d4cb;text-align:left;
    padding:10px 11px;border-radius:9px;font-size:14px;font-weight:450;
    transition:background .15s,color .15s;
  }
  .nav button svg{width:17px;height:17px;flex:none;opacity:.85}
  .nav button:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav button.active{background:rgba(255,255,255,.12);color:#fff;font-weight:500}
  .nav .group-label{
    font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--green-300);padding:18px 11px 7px;opacity:.8;
  }
  .side-foot{margin-top:auto;padding:14px 11px 2px;border-top:1px solid rgba(255,255,255,.09)}
  .side-foot label{display:block;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--green-300);margin-bottom:7px}
  .side-foot select{
    width:100%;background:rgba(255,255,255,.07);color:#eaf2ed;
    border:1px solid rgba(255,255,255,.14);border-radius:8px;
    padding:8px 9px;font-size:13px;font-family:inherit;cursor:pointer;
  }
  .side-foot select:focus{outline:2px solid var(--green-300);outline-offset:1px}

  /* ---------- Main ---------- */
  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{
    display:flex;align-items:center;gap:16px;
    padding:18px 30px;border-bottom:1px solid var(--line);
    background:rgba(245,247,244,.85);backdrop-filter:blur(6px);
    position:sticky;top:0;z-index:20;
  }
  .topbar h1{font-family:var(--display);font-weight:600;font-size:20px;margin:0;letter-spacing:.2px}
  .topbar .sub{color:var(--muted);font-size:13px;margin-top:1px}
  .topbar .spacer{flex:1}
  .content{padding:26px 30px 60px;max-width:1180px;width:100%}

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex;align-items:center;gap:7px;justify-content:center;
    border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);
    padding:9px 15px;border-radius:9px;font-size:13.5px;font-weight:500;cursor:pointer;
    transition:border-color .15s,background .15s,transform .04s;
  }
  .btn svg{width:15px;height:15px}
  .btn:hover{border-color:var(--green-500)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--green-600);border-color:var(--green-600);color:#fff}
  .btn.primary:hover{background:var(--green-700);border-color:var(--green-700)}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);padding:8px 10px}
  .btn.ghost:hover{background:rgba(20,51,36,.05);color:var(--ink)}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  .btn.danger:hover{border-color:var(--red-700);color:var(--red-700)}

  /* ---------- Stats ---------- */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
  .stat{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:15px 16px;position:relative;overflow:hidden;
  }
  .stat .n{font-family:var(--display);font-weight:600;font-size:27px;line-height:1;color:var(--ink)}
  .stat .l{color:var(--muted);font-size:12.5px;margin-top:6px}
  .stat .tick{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green-500)}
  .stat.amber .tick{background:var(--amber-700)}
  .stat.red .tick{background:var(--red-700)}
  .stat.muted .tick{background:var(--line-strong)}

  /* ---------- Section header ---------- */
  .sec-head{display:flex;align-items:flex-end;gap:14px;margin:0 0 16px}
  .sec-head h2{font-family:var(--display);font-weight:600;font-size:16px;margin:0;letter-spacing:.2px}
  .sec-head .count{color:var(--faint);font-size:13px;margin-bottom:1px}
  .sec-head .spacer{flex:1}

  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .chip-filter{
    border:1px solid var(--line-strong);background:var(--surface);
    padding:6px 12px;border-radius:99px;font-size:12.5px;color:var(--muted);cursor:pointer;
    transition:all .14s;
  }
  .chip-filter:hover{border-color:var(--green-500)}
  .chip-filter.on{background:var(--green-900);border-color:var(--green-900);color:#fff}

  /* ---------- Cards grid ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}

  .promo{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:17px 17px 15px;display:flex;flex-direction:column;gap:11px;position:relative;
    box-shadow:var(--shadow);transition:border-color .15s,transform .12s;
  }
  .promo:hover{border-color:var(--line-strong);transform:translateY(-1px)}
  .promo.featured{border-color:var(--green-300)}
  .promo .top{display:flex;align-items:flex-start;gap:10px}
  .promo .disc{
    font-family:var(--display);font-weight:700;font-size:22px;line-height:1;
    color:var(--green-700);white-space:nowrap;
  }
  .promo h3{font-size:15.5px;font-weight:600;margin:0;line-height:1.25}
  .promo .desc{color:var(--muted);font-size:13px;margin:0}
  .promo .brands{display:flex;gap:6px;flex-wrap:wrap}
  .tag{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--green-100);color:var(--green-700);font-weight:500}
  .tag.suc{background:#eef1ee;color:var(--muted)}
  .promo .foot{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:9px;border-top:1px solid var(--line)}
  .promo .foot .who{font-size:11.5px;color:var(--faint)}

  .vig{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:500;padding:4px 9px;border-radius:99px}
  .vig .dot{width:6px;height:6px;border-radius:50%}
  .vig.live{background:var(--green-100);color:var(--green-700)}
  .vig.live .dot{background:var(--green-500)}
  .vig.soon{background:var(--amber-100);color:var(--amber-700)}
  .vig.soon .dot{background:var(--amber-700)}
  .vig.future{background:#eaeef6;color:#3a5b8a}
  .vig.future .dot{background:#3a5b8a}
  .vig.past{background:var(--red-100);color:var(--red-700)}
  .vig.past .dot{background:var(--red-700)}
  .star{margin-left:auto;color:var(--green-500)}
  .channel{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600}

  /* ---------- Capacitacion card ---------- */
  .capa{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:17px;display:flex;flex-direction:column;gap:12px;box-shadow:var(--shadow);
    transition:border-color .15s,transform .12s;
  }
  .capa:hover{border-color:var(--line-strong);transform:translateY(-1px)}
  .capa .when{
    display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--muted);
  }
  .capa .date-badge{
    width:46px;height:46px;border-radius:10px;background:var(--green-900);color:#fff;flex:none;
    display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;
  }
  .capa .date-badge .d{font-family:var(--display);font-weight:600;font-size:19px}
  .capa .date-badge .m{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;color:var(--green-300)}
  .capa h3{font-size:15.5px;font-weight:600;margin:0;line-height:1.25}
  .capa .meta{display:flex;gap:7px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .capa .meta span{display:inline-flex;align-items:center;gap:5px}
  .cupo{margin-top:2px}
  .cupo .bar{height:7px;background:#eef1ee;border-radius:99px;overflow:hidden}
  .cupo .bar i{display:block;height:100%;background:var(--green-500);border-radius:99px;transition:width .3s}
  .cupo .bar i.full{background:var(--red-700)}
  .cupo .bar i.tight{background:var(--amber-700)}
  .cupo .lab{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:6px}
  .capa .acts{display:flex;gap:8px;margin-top:auto;padding-top:4px}
  .modality{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:3px 8px;border-radius:6px}
  .modality.online{background:#e9eef7;color:#3a5b8a}
  .modality.presencial{background:var(--green-100);color:var(--green-700)}

  /* ---------- Forms ---------- */
  .panel{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:24px 26px;max-width:680px;box-shadow:var(--shadow);
  }
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field{margin-bottom:16px;display:flex;flex-direction:column;gap:6px}
  .field.full{grid-column:1/-1}
  label.lab{font-size:12.5px;font-weight:500;color:var(--ink)}
  label.lab .opt{color:var(--faint);font-weight:400}
  input,textarea,select{
    font-family:inherit;font-size:14px;color:var(--ink);
    border:1px solid var(--line-strong);border-radius:9px;padding:9px 11px;background:#fff;
    transition:border-color .15s,box-shadow .15s;width:100%;
  }
  textarea{resize:vertical;min-height:74px}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--green-500);box-shadow:0 0 0 3px var(--green-100)}
  .hint{font-size:11.5px;color:var(--faint)}
  .check-grid{display:flex;flex-wrap:wrap;gap:8px}
  .cbox{
    display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line-strong);
    border-radius:8px;padding:7px 11px;font-size:13px;cursor:pointer;user-select:none;transition:all .14s;
  }
  .cbox:hover{border-color:var(--green-500)}
  .cbox input{width:auto;margin:0}
  .cbox.on{background:var(--green-100);border-color:var(--green-300);color:var(--green-700);font-weight:500}
  .seg{display:flex;border:1px solid var(--line-strong);border-radius:9px;overflow:hidden;width:fit-content}
  .seg button{border:0;background:#fff;padding:8px 15px;font-size:13px;cursor:pointer;color:var(--muted);border-right:1px solid var(--line-strong)}
  .seg button:last-child{border-right:0}
  .seg button.on{background:var(--green-600);color:#fff;font-weight:500}
  .form-actions{display:flex;gap:10px;align-items:center;margin-top:8px}
  .form-actions .note{color:var(--faint);font-size:12px;margin-left:auto}

  /* ---------- Empty ---------- */
  .empty{
    text-align:center;padding:54px 20px;border:1px dashed var(--line-strong);
    border-radius:var(--radius);color:var(--muted);background:#fbfcfb;
  }
  .empty h3{font-family:var(--display);font-weight:600;color:var(--ink);margin:0 0 6px;font-size:16px}
  .empty p{margin:0 0 16px;font-size:13.5px}

  /* ---------- Drawer / modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(20,32,25,.42);backdrop-filter:blur(2px);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{
    position:fixed;top:0;right:0;height:100vh;width:min(460px,100%);background:var(--bg);
    z-index:60;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;box-shadow:-20px 0 60px -30px rgba(20,51,36,.5);
  }
  .drawer.open{transform:translateX(0)}
  .drawer .dh{display:flex;align-items:flex-start;gap:12px;padding:20px 22px;border-bottom:1px solid var(--line);background:var(--surface)}
  .drawer .dh h2{font-family:var(--display);font-weight:600;font-size:17px;margin:0}
  .drawer .dh .sub{font-size:12.5px;color:var(--muted);margin-top:3px}
  .drawer .db{flex:1;overflow:auto;padding:18px 22px}
  .drawer .df{padding:16px 22px;border-top:1px solid var(--line);background:var(--surface)}

  .insc-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
  .insc{display:flex;align-items:center;gap:11px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .insc .av{width:32px;height:32px;border-radius:50%;background:var(--green-100);color:var(--green-700);display:grid;place-items:center;font-weight:600;font-size:13px;flex:none;font-family:var(--display)}
  .insc .who{flex:1;min-width:0}
  .insc .who b{font-size:13.5px;font-weight:600;display:block;line-height:1.2}
  .insc .who small{font-size:11.5px;color:var(--muted)}
  .insc .x{border:0;background:transparent;color:var(--faint);cursor:pointer;padding:4px;border-radius:6px;line-height:0}
  .insc .x:hover{background:var(--red-100);color:var(--red-700)}
  .mini-form{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px}
  .mini-form h4{font-family:var(--display);font-size:13.5px;margin:0 0 12px;font-weight:600}

  /* ---------- Toast ---------- */
  .toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{
    background:var(--green-900);color:#eaf2ed;padding:11px 16px;border-radius:10px;font-size:13.5px;
    box-shadow:0 10px 40px -12px rgba(20,51,36,.6);display:flex;align-items:center;gap:9px;
    animation:rise .25s ease;
  }
  .toast svg{width:16px;height:16px;color:var(--green-300)}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .req{color:var(--red-700)}
  .view{display:none}
  .view.on{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  .menu-btn{display:none}

  /* ---------- Responsive ---------- */
  @media (max-width:900px){
    .app{grid-template-columns:1fr}
    .side{position:fixed;left:0;top:0;z-index:70;width:236px;transform:translateX(-100%);transition:transform .25s}
    .side.open{transform:translateX(0)}
    .menu-btn{display:inline-flex}
    .stats{grid-template-columns:repeat(2,1fr)}
    .form-row{grid-template-columns:1fr}
    .content{padding:20px 18px 50px}
    .topbar{padding:14px 18px}
  }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="side" id="side">
    <div class="brand">
      <div class="mark">K</div>
      <div>
        <b>Koré</b>
        <small>Panel interno</small>
      </div>
    </div>
    <nav class="nav" id="nav">
      <div class="group-label">Operación</div>
      <button data-view="promos" class="active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41 13.42 20.58a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82Z"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/></svg>
        Promociones
      </button>
      <button data-view="capas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1 3 3 6 3s6-2 6-3v-5"/></svg>
        Capacitaciones
      </button>
      <div class="group-label">Cargar</div>
      <button data-view="new-promo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Nueva promoción
      </button>
      <button data-view="new-capa">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Nueva capacitación
      </button>
    </nav>
    <div class="side-foot">
      <label for="sucCtx">Sucursal</label>
      <select id="sucCtx">
        <option value="todas">Todas las sucursales</option>
        <option>Santa Fe</option>
        <option>Paraná</option>
        <option>Concepción del Uruguay</option>
        <option>Esperanza</option>
      </select>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <button class="btn ghost menu-btn" id="menuBtn" aria-label="Menú">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div>
        <h1 id="pageTitle">Promociones vigentes</h1>
        <div class="sub" id="pageSub">Lo que está al aire hoy en el mostrador y en redes</div>
      </div>
      <div class="spacer"></div>
      <button class="btn primary" id="topAction">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Nueva promoción
      </button>
    </header>

    <main class="content">
      <!-- ===== PROMOS ===== -->
      <section class="view on" id="view-promos">
        <div class="stats" id="promoStats"></div>
        <div class="filters" id="promoFilters">
          <button class="chip-filter on" data-pf="todas">Todas</button>
          <button class="chip-filter" data-pf="live">Vigentes</button>
          <button class="chip-filter" data-pf="soon">Por vencer</button>
          <button class="chip-filter" data-pf="future">Programadas</button>
          <button class="chip-filter" data-pf="past">Vencidas</button>
        </div>
        <div id="promoGrid" class="grid"></div>
      </section>

      <!-- ===== CAPAS ===== -->
      <section class="view" id="view-capas">
        <div class="stats" id="capaStats"></div>
        <div class="sec-head">
          <h2>Agenda de capacitaciones</h2>
          <span class="count" id="capaCount"></span>
          <div class="spacer"></div>
          <button class="btn sm" data-goto="new-capa">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            Agendar
          </button>
        </div>
        <div id="capaGrid" class="grid"></div>
      </section>

      <!-- ===== NEW PROMO ===== -->
      <section class="view" id="view-new-promo">
        <div class="panel">
          <form id="promoForm" autocomplete="off">
            <div class="field full">
              <label class="lab" for="p_titulo">Título de la promo <span class="req">*</span></label>
              <input id="p_titulo" required placeholder="Ej: Semana del ácido — Prodermic" />
            </div>
            <div class="field full">
              <label class="lab" for="p_desc">Descripción <span class="opt">· para el equipo y la placa</span></label>
              <textarea id="p_desc" placeholder="Qué incluye, condiciones, mínimo de compra…"></textarea>
            </div>
            <div class="form-row">
              <div class="field">
                <label class="lab">Tipo de beneficio</label>
                <div class="seg" id="p_tipo">
                  <button type="button" data-t="porcentaje" class="on">% Off</button>
                  <button type="button" data-t="2x1">2x1</button>

<script>
/* =====================================================================
   Koré · Panel interno
   Capa de datos intercambiable. Por defecto guarda en este navegador
   (localStorage). Para que TODO el equipo vea lo mismo, ver README:
   se reemplaza el objeto Store por la versión Firebase/Sheets.
   ===================================================================== */

const SUCURSALES = ["Santa Fe","Paraná","Concepción del Uruguay","Esperanza"];
const MARCAS = ["Prodermic","Lidherma Pro","Mira Dror","Icono Cosmética","Zine","Carthage","Dermassy","Capilatis"];

/* ---------- Store (localStorage + fallback en memoria) ---------- */
const Store = {
  _mem:{},
  _k:k=>"kore_"+k,
  get(key){
    try{ const v=localStorage.getItem(this._k(key)); if(v!=null) return JSON.parse(v); }catch(e){}
    return this._mem[key] ?? null;
  },
  set(key,val){
    this._mem[key]=val;
    try{ localStorage.setItem(this._k(key), JSON.stringify(val)); }catch(e){}
  }
};

const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const today = ()=> new Date();
const iso = d => new Date(d).toISOString().slice(0,10);

/* ---------- Seed inicial (solo la 1ª vez) ---------- */
function seed(){
  if(Store.get("seeded")) return;
  const d = (off)=>{ const x=new Date(); x.setDate(x.getDate()+off); return iso(x); };
  const dt = (off,h=15)=>{ const x=new Date(); x.setDate(x.getDate()+off); x.setHours(h,0,0,0); return x.toISOString().slice(0,16); };

  Store.set("promos",[
    {id:uid(),titulo:"Semana del ácido — Prodermic",desc:"30% en línea de ácidos y peelings. Mínimo 5 unidades surtidas.",tipo:"porcentaje",valor:30,desde:d(-3),hasta:d(4),marcas:["Prodermic"],sucs:["Santa Fe","Paraná","Esperanza"],canal:"profesional",destacada:true,autor:"Flor (CM)",creada:Date.now()},
    {id:uid(),titulo:"Lidherma Pro 40% OFF",desc:"Liquidación de temporada en sueros y bioactivos seleccionados.",tipo:"porcentaje",valor:40,desde:d(-1),hasta:d(2),marcas:["Lidherma Pro"],sucs:SUCURSALES,canal:"ambos",destacada:false,autor:"Flor (CM)",creada:Date.now()-86400000},
    {id:uid(),titulo:"Combo cabina Mira Dror",desc:"Peeling + neutralizante + post a precio combo. Ideal arranque de cabina.",tipo:"combo",valor:0,desde:d(2),hasta:d(12),marcas:["Mira Dror"],sucs:["Paraná","Concepción del Uruguay"],canal:"profesional",destacada:false,autor:"Mati",creada:Date.now()-2*86400000},
    {id:uid(),titulo:"Parches de ojos 2x1 — Icono",desc:"Llevá dos, pagá uno. Solo público, mientras dure el stock.",tipo:"2x1",valor:0,desde:d(-10),hasta:d(-1),marcas:["Icono Cosmética"],sucs:["Santa Fe"],canal:"publico",destacada:false,autor:"Flor (CM)",creada:Date.now()-9*86400000},
  ]);

  const c1=uid(), c2=uid(), c3=uid();
  Store.set("capas",[
    {id:c1,titulo:"Protocolo de peeling con Mira Dror",desc:"Indicaciones, neutralización y post. Para cosmiatras y esteticistas.",fecha:dt(6,15),cupos:24,mod:"presencial",lugar:"Sucursal Santa Fe",instructor:"Dra. Vanesa Roldán",suc:"Santa Fe",creada:Date.now()},
    {id:c2,titulo:"Activos concentrados: cómo armar una rutina vendible",desc:"Webinar abierto a todo el país. Combos rentables para tu cabina.",fecha:dt(11,19),cupos:100,mod:"online",lugar:"Google Meet (link al confirmar)",instructor:"Equipo técnico Koré",suc:"Online / todas",creada:Date.now()},
    {id:c3,titulo:"Introducción a aparatología dérmica",desc:"Qué equipo para qué tratamiento. Cupo reducido con práctica.",fecha:dt(2,16),cupos:12,mod:"presencial",lugar:"Sucursal Paraná",instructor:"Lic. Gómez",suc:"Paraná",creada:Date.now()},
  ]);

  Store.set("inscriptos",[
    {id:uid(),capaId:c1,nombre:"Carla Méndez",contacto:"carla.estetica@gmail.com",profesion:"Cosmiatra",suc:"Santa Fe",fecha:Date.now()},
    {id:uid(),capaId:c1,nombre:"Romina Díaz",contacto:"11 5566 7788",profesion:"Esteticista",suc:"Esperanza",fecha:Date.now()},
    {id:uid(),capaId:c3,nombre:"Lucía Fernández",contacto:"lu.fernandez@hotmail.com",profesion:"Centro de estética",suc:"Paraná",fecha:Date.now()},
  ]);
  Store.set("seeded",true);
}
seed();

/* ---------- Helpers de estado de vigencia ---------- */
function vigencia(p){
  const t=today(); t.setHours(0,0,0,0);
  const desde=new Date(p.desde+"T00:00:00"), hasta=new Date(p.hasta+"T23:59:59");
  if(t<desde){ const days=Math.ceil((desde-t)/86400000); return {key:"future",label:`Empieza en ${days} d`}; }
  if(t>hasta){ return {key:"past",label:"Vencida"}; }
  const left=Math.ceil((hasta-t)/86400000);
  if(left<=3) return {key:"soon",label: left<=1?"Vence hoy/mañana":`Vence en ${left} d`};
  return {key:"live",label:`Vigente · ${left} d`};
}
function discLabel(p){
  if(p.tipo==="porcentaje") return (p.valor||0)+"%";
  if(p.tipo==="monto") return "$"+(p.valor||0);
  if(p.tipo==="2x1") return "2×1";
  if(p.tipo==="combo") return "Combo";
  return "";
}
const fmtDate = s => new Date(s).toLocaleDateString("es-AR",{day:"2-digit",month:"short"});
function capaDateParts(s){
  const d=new Date(s);
  return {d:d.getDate(), m:d.toLocaleDateString("es-AR",{month:"short"}).replace(".",""),
          full:d.toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"}),
          time:d.toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})};
}

/* ---------- Filtro por sucursal (contexto global) ---------- */
function sucCtx(){ return document.getElementById("sucCtx").value; }
function matchSuc(arrSucs){
  const s=sucCtx();
  if(s==="todas") return true;
  return (arrSucs||[]).includes(s) || (arrSucs||[]).includes("Online / todas");
}

/* ===================== RENDER: PROMOS ===================== */
let promoFilter="todas";
function renderPromos(){
  const promos=(Store.get("promos")||[]).filter(p=>matchSuc(p.sucs));
  const counts={live:0,soon:0,future:0,past:0};
  promos.forEach(p=>counts[vigencia(p).key]++);

  document.getElementById("promoStats").innerHTML = [
    {n:counts.live, l:"Vigentes hoy", cls:""},
    {n:counts.soon, l:"Por vencer (≤3 días)", cls:"amber"},
    {n:counts.future, l:"Programadas", cls:"muted"},
    {n:counts.past, l:"Vencidas", cls:"red"},
  ].map(s=>`<div class="stat ${s.cls}"><div class="tick"></div><div class="n">${s.n}</div><div class="l">${s.l}</div></div>`).join("");

  let list=[...promos];
  if(promoFilter!=="todas") list=list.filter(p=>vigencia(p).key===promoFilter);
  // orden: destacadas, luego por vigencia (live, soon, future, past), luego fecha
  const rank={live:0,soon:1,future:2,past:3};
  list.sort((a,b)=> (b.destacada-a.destacada) || (rank[vigencia(a).key]-rank[vigencia(b).key]) || (new Date(a.hasta)-new Date(b.hasta)));

  const grid=document.getElementById("promoGrid");
  if(!list.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1">
      <h3>Sin promociones para mostrar</h3>
      <p>${promos.length? "No hay promos con ese estado en la sucursal elegida." : "Todavía no cargaste ninguna promoción."}</p>
      <button class="btn primary" data-goto="new-promo" style="margin:0 auto">Crear la primera</button></div>`;
    bindGoto(); return;
  }
  grid.innerHTML=list.map(p=>{
    const v=vigencia(p), disc=discLabel(p);
    const chanLabel={ambos:"Pro + Público",profesional:"Profesional",publico:"Público"}[p.canal]||"";
    return `<article class="promo ${p.destacada?'featured':''}">
      <div class="top">
        ${disc?`<div class="disc">${disc}</div>`:""}
        <div style="flex:1">
          <h3>${esc(p.titulo)}</h3>
          <span class="channel">${chanLabel}</span>
        </div>
        ${p.destacada?`<span class="star" title="Destacada"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2 2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.8 5.9 20.6l1.4-6.8L2.2 9.1l6.9-.8L12 2Z"/></svg></span>`:""}
      </div>
      ${p.desc?`<p class="desc">${esc(p.desc)}</p>`:""}
      <div class="brands">
        ${(p.marcas||[]).map(m=>`<span class="tag">${esc(m)}</span>`).join("")}
        ${(p.sucs||[]).map(s=>`<span class="tag suc">${esc(s)}</span>`).join("")}
      </div>
      <div class="foot">
        <span class="vig ${v.key}"><span class="dot"></span>${v.label}</span>
        <span class="who">${fmtDate(p.desde)}–${fmtDate(p.hasta)}${p.autor? " · "+esc(p.autor):""}</span>
        <button class="btn ghost sm" data-del-promo="${p.id}" title="Eliminar" style="margin-left:auto;padding:5px">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>
        </button>
      </div>
    </article>`;
  }).join("");

  grid.querySelectorAll("[data-del-promo]").forEach(b=>b.onclick=()=>{
    if(confirm("¿Eliminar esta promoción?")){
      Store.set("promos",(Store.get("promos")||[]).filter(x=>x.id!==b.dataset.delPromo));
      renderPromos(); toast("Promoción eliminada");
    }
  });
}

/* ===================== RENDER: CAPAS ===================== */
function inscriptosDe(capaId){ return (Store.get("inscriptos")||[]).filter(i=>i.capaId===capaId); }
function renderCapas(){
  let capas=(Store.get("capas")||[]).filter(c=> sucCtx()==="todas" || c.suc===sucCtx() || c.suc==="Online / todas");
  capas.sort((a,b)=> new Date(a.fecha)-new Date(b.fecha));

  const total=capas.length;
  const cupoTot=capas.reduce((s,c)=>s+ +c.cupos,0);
  const inscTot=capas.reduce((s,c)=>s+inscriptosDe(c.id).length,0);
  const proximas=capas.filter(c=> new Date(c.fecha)>=today()).length;
  document.getElementById("capaStats").innerHTML=[
    {n:proximas,l:"Próximas",cls:""},
    {n:inscTot,l:"Inscriptos totales",cls:""},
    {n:cupoTot? Math.round(inscTot/cupoTot*100)+"%":"0%",l:"Ocupación de cupos",cls:"muted"},
    {n:total,l:"En agenda",cls:"muted"},
  ].map(s=>`<div class="stat ${s.cls}"><div class="tick"></div><div class="n">${s.n}</div><div class="l">${s.l}</div></div>`).join("");

  document.getElementById("capaCount").textContent = total? total+(total===1?" capacitación":" capacitaciones") : "";

  const grid=document.getElementById("capaGrid");
  if(!capas.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1">
      <h3>Agenda vacía</h3><p>Agendá la primera capacitación para empezar a anotar gente.</p>
      <button class="btn primary" data-goto="new-capa" style="margin:0 auto">Agendar capacitación</button></div>`;
    bindGoto(); return;
  }
  grid.innerHTML=capas.map(c=>{
    const dp=capaDateParts(c.fecha), ins=inscriptosDe(c.id).length, cup=+c.cupos;
    const pct=cup? Math.min(100,Math.round(ins/cup*100)):0;
    const fill = pct>=100?"full": pct>=80?"tight":"";
    const past = new Date(c.fecha)<today();
    return `<article class="capa">
      <div class="when">
        <div class="date-badge" style="${past?'opacity:.5':''}"><span class="d">${dp.d}</span><span class="m">${dp.m}</span></div>
        <div>
          <div style="text-transform:capitalize">${dp.full}</div>
          <div style="color:var(--faint)">${dp.time} h · <span class="modality ${c.mod}">${c.mod}</span></div>
        </div>
      </div>
      <h3>${esc(c.titulo)}</h3>
      ${c.desc?`<p class="desc" style="color:var(--muted);font-size:13px;margin:0">${esc(c.desc)}</p>`:""}
      <div class="meta">
        ${c.lugar?`<span>📍 ${esc(c.lugar)}</span>`:""}
        ${c.instructor?`<span>· ${esc(c.instructor)}</span>`:""}
      </div>
      <div class="cupo">
        <div class="lab"><span>${ins} de ${cup} inscriptos</span><span>${pct}%</span></div>
        <div class="bar"><i class="${fill}" style="width:${pct}%"></i></div>
      </div>
      <div class="acts">
        <button class="btn sm primary" data-insc="${c.id}" style="flex:1">Anotar / ver inscriptos</button>
      </div>
    </article>`;
  }).join("");

  grid.querySelectorAll("[data-insc]").forEach(b=>b.onclick=()=>openDrawer(b.dataset.insc));
}

/* ===================== DRAWER inscriptos ===================== */
let drawerCapa=null;
function openDrawer(capaId){
  drawerCapa=capaId;
  const c=(Store.get("capas")||[]).find(x=>x.id===capaId);
  if(!c) return;
  const dp=capaDateParts(c.fecha);
  document.getElementById("drTitle").textContent=c.titulo;
  document.getElementById("drSub").textContent=`${dp.full} · ${dp.time} h · cupo ${c.cupos}`;
  renderInsc();
  document.getElementById("drawer").classList.add("open");
  document.getElementById("scrim").classList.add("open");
  document.getElementById("drawer").setAttribute("aria-hidden","false");
}
function closeDrawer(){
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("scrim").classList.remove("open");
  document.getElementById("drawer").setAttribute("aria-hidden","true");
  drawerCapa=null;
}
function renderInsc(){
  const c=(Store.get("capas")||[]).find(x=>x.id===drawerCapa);
  const list=inscriptosDe(drawerCapa);
  const wrap=document.getElementById("inscList");
  const cupo=c?+c.cupos:0;
  if(!list.length){
    wrap.innerHTML=`<div class="empty" style="padding:30px 16px"><p style="margin:0">Todavía no hay nadie anotado.<br>Sumá la primera persona abajo.</p></div>`;
  }else{
    wrap.innerHTML = `<div class="lab" style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-bottom:4px">
        <span>${list.length} anotados</span>${cupo? `<span>${Math.max(0,cupo-list.length)} cupos libres</span>`:""}</div>`+
      list.map(i=>{
        const initials=(i.nombre||"?").split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
        return `<div class="insc">
          <div class="av">${initials}</div>
          <div class="who"><b>${esc(i.nombre)}</b><small>${esc(i.contacto||"")}${i.profesion?" · "+esc(i.profesion):""}${i.suc?" · "+esc(i.suc):""}</small></div>
          <button class="x" data-del-insc="${i.id}" title="Quitar"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
        </div>`;
      }).join("");
    wrap.querySelectorAll("[data-del-insc]").forEach(b=>b.onclick=()=>{
      Store.set("inscriptos",(Store.get("inscriptos")||[]).filter(x=>x.id!==b.dataset.delInsc));
      renderInsc(); renderCapas(); toast("Persona quitada de la lista");
    });
  }
}
document.getElementById("inscForm").addEventListener("submit",e=>{
  e.preventDefault();
  const nombre=val("i_nombre"), contacto=val("i_contacto");
  if(!nombre||!contacto) return;
  const all=Store.get("inscriptos")||[];
  all.push({id:uid(),capaId:drawerCapa,nombre,contacto,profesion:val("i_profesion"),suc:val("i_suc"),fecha:Date.now()});
  Store.set("inscriptos",all);
  e.target.reset();
  renderInsc(); renderCapas(); toast(nombre.split(" ")[0]+" quedó anotada");
  document.getElementById("i_nombre").focus();
});
document.getElementById("exportBtn").onclick=()=>{
  const c=(Store.get("capas")||[]).find(x=>x.id===drawerCapa);
  const list=inscriptosDe(drawerCapa);
  if(!list.length){ toast("No hay inscriptos para exportar"); return; }
  const rows=[["Nombre","Contacto","Profesión","Sucursal","Anotado el"]];
  list.forEach(i=>rows.push([i.nombre,i.contacto,i.profesion||"",i.suc||"",new Date(i.fecha).toLocaleString("es-AR")]));
  const csv="\uFEFF"+rows.map(r=>r.map(f=>`"${(f+"").replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`inscriptos-${(c?c.titulo:"capacitacion").replace(/[^a-z0-9]+/gi,"-").toLowerCase()}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
  toast("Lista descargada");
};

/* ===================== FORM: NEW PROMO ===================== */
let pTipo="porcentaje", pCanal="ambos", pMarcasSel=new Set(), pSucsSel=new Set();
function initPromoForm(){
  const mc=document.getElementById("p_marcas");
  mc.innerHTML=MARCAS.map(m=>`<label class="cbox" data-m="${m}"><input type="checkbox" value="${m}">${m}</label>`).join("");
  mc.querySelectorAll(".cbox").forEach(l=>l.onclick=e=>{
    if(e.target.tagName!=="INPUT"){ const i=l.querySelector("input"); i.checked=!i.checked; }
    const i=l.querySelector("input"); l.classList.toggle("on",i.checked);
    i.checked?pMarcasSel.add(l.dataset.m):pMarcasSel.delete(l.dataset.m);
  });
  const sc=document.getElementById("p_sucs");
  sc.innerHTML=SUCURSALES.map(s=>`<label class="cbox" data-s="${s}"><input type="checkbox" value="${s}">${s}</label>`).join("");
  sc.querySelectorAll(".cbox").forEach(l=>l.onclick=e=>{
    if(e.target.tagName!=="INPUT"){ const i=l.querySelector("input"); i.checked=!i.checked; }
    const i=l.querySelector("input"); l.classList.toggle("on",i.checked);
    i.checked?pSucsSel.add(l.dataset.s):pSucsSel.delete(l.dataset.s);
  });
  segHandler("p_tipo","t",v=>{pTipo=v; updateValHint();});
  segHandler("p_canal","c",v=>pCanal=v);
  document.getElementById("p_destLabel").onclick=e=>{
    if(e.target.tagName!=="INPUT"){ const i=document.getElementById("p_destacada"); i.checked=!i.checked; }
    document.getElementById("p_destLabel").classList.toggle("on",document.getElementById("p_destacada").checked);
  };
  document.getElementById("p_valor").addEventListener("input",updateValHint);
  // fechas por defecto
  document.getElementById("p_desde").value=iso(today());
  const h=new Date(); h.setDate(h.getDate()+7); document.getElementById("p_hasta").value=iso(h);
  updateValHint();
}
function updateValHint(){
  const v=val("p_valor")||"0", w=document.getElementById("p_valWrap"), hint=document.getElementById("p_valHint");
  if(pTipo==="2x1"||pTipo==="combo"){ w.style.opacity=.45; document.getElementById("p_valor").disabled=true; hint.textContent="Sin valor numérico"; }
  else{ w.style.opacity=1; document.getElementById("p_valor").disabled=false;
    hint.textContent = pTipo==="porcentaje"? `Se muestra como ${v}% OFF` : `Se muestra como $${v} OFF`; }
}
document.getElementById("promoForm").addEventListener("submit",e=>{
  e.preventDefault();
  if(!pSucsSel.size){ toast("Elegí al menos una sucursal"); return; }
  const desde=val("p_desde"), hasta=val("p_hasta");
  if(hasta<desde){ toast("La fecha de fin no puede ser anterior al inicio"); return; }
  const all=Store.get("promos")||[];
  all.push({id:uid(),titulo:val("p_titulo"),desc:val("p_desc"),tipo:pTipo,valor:+val("p_valor")||0,
    desde,hasta,marcas:[...pMarcasSel],sucs:[...pSucsSel],canal:pCanal,
    destacada:document.getElementById("p_destacada").checked,autor:val("p_autor"),creada:Date.now()});
  Store.set("promos",all);
  resetPromoForm();
  toast("Promoción publicada");
  go("promos");
});
document.getElementById("promoForm").addEventListener("reset",()=>setTimeout(resetPromoForm,0));
function resetPromoForm(){
  pMarcasSel.clear(); pSucsSel.clear();
  document.querySelectorAll("#p_marcas .cbox,#p_sucs .cbox").forEach(l=>l.classList.remove("on"));
  document.getElementById("p_destLabel").classList.remove("on");
}

/* ===================== FORM: NEW CAPA ===================== */
let cMod="presencial";
function initCapaForm(){
  segHandler("c_mod","m",v=>cMod=v);
  const n=new Date(); n.setDate(n.getDate()+7); n.setHours(15,0,0,0);
  document.getElementById("c_fecha").value=n.toISOString().slice(0,16);
}
document.getElementById("capaForm").addEventListener("submit",e=>{
  e.preventDefault();
  const all=Store.get("capas")||[];
  all.push({id:uid(),titulo:val("c_titulo"),desc:val("c_desc"),fecha:val("c_fecha"),
    cupos:+val("c_cupos")||1,mod:cMod,lugar:val("c_lugar"),instructor:val("c_instructor"),suc:val("c_suc"),creada:Date.now()});
  Store.set("capas",all);
  e.target.reset(); initCapaForm();
  toast("Capacitación agendada");
  go("capas");
});

/* ===================== NAV / VIEWS ===================== */
const TITLES={
  promos:["Promociones vigentes","Lo que está al aire hoy en el mostrador y en redes"],
  capas:["Capacitaciones","Agenda, cupos e inscriptos"],
  "new-promo":["Nueva promoción","Cargá una promo para todo el equipo"],
  "new-capa":["Nueva capacitación","Agendá una fecha y abrí inscripciones"],
};
function go(view){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("on"));
  document.getElementById("view-"+view).classList.add("on");
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active",b.dataset.view===view));
  const [t,s]=TITLES[view]||["",""];
  document.getElementById("pageTitle").textContent=t;
  document.getElementById("pageSub").textContent=s;
  const top=document.getElementById("topAction");
  if(view==="capas"||view==="new-capa"){ top.dataset.view="new-capa"; top.lastChild.textContent="Nueva capacitación"; }
  else { top.dataset.view="new-promo"; top.lastChild.textContent="Nueva promoción"; }
  top.style.display = (view.startsWith("new"))? "none":"inline-flex";
  if(view==="promos") renderPromos();
  if(view==="capas") renderCapas();
  document.getElementById("side").classList.remove("open");
  window.scrollTo(0,0);
}
document.querySelectorAll("#nav button").forEach(b=>b.onclick=()=>go(b.dataset.view));
document.getElementById("topAction").onclick=function(){ go(this.dataset.view); };
function bindGoto(){ document.querySelectorAll("[data-goto]").forEach(b=>b.onclick=()=>go(b.dataset.goto)); }

document.getElementById("promoFilters").querySelectorAll(".chip-filter").forEach(c=>c.onclick=()=>{
  promoFilter=c.dataset.pf;
  document.querySelectorAll("#promoFilters .chip-filter").forEach(x=>x.classList.toggle("on",x===c));
  renderPromos();
});
document.getElementById("sucCtx").onchange=()=>{ renderPromos(); renderCapas(); };
document.getElementById("menuBtn").onclick=()=>document.getElementById("side").classList.toggle("open");
document.getElementById("drClose").onclick=closeDrawer;
document.getElementById("scrim").onclick=closeDrawer;
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeDrawer(); });

/* ===================== Utils ===================== */
function val(id){ const el=document.getElementById(id); return el?el.value.trim():""; }
function esc(s){ return (s==null?"":s+"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function segHandler(id,attr,cb){
  const wrap=document.getElementById(id);
  wrap.querySelectorAll("button").forEach(b=>b.onclick=()=>{
    wrap.querySelectorAll("button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); cb(b.dataset[attr]);
  });
}
function toast(msg){
  const t=document.createElement("div"); t.className="toast";
  t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>${esc(msg)}`;
  document.getElementById("toasts").appendChild(t);
  setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .3s"; setTimeout(()=>t.remove(),300); },2600);
}

/* ===================== Init ===================== */
initPromoForm(); initCapaForm(); bindGoto();
go("promos");
</script>
